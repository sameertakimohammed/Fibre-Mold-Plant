[pytest]
# Run from the backend/ directory so `app` (backend/app) is importable.
# pythonpath puts backend/ on sys.path for BOTH `pytest` (console script) and
# `python -m pytest` — the console script does not add the cwd, so without this
# `from app.main import app` in conftest fails under CI. (pytest >= 7.0.)
pythonpath = .
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -q --strict-markers
filterwarnings =
    ignore::DeprecationWarning
