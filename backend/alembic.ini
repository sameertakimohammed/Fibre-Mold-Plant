# Alembic configuration for the Fibre Mold Plant backend.
#
# The database URL is NOT set here — it is read from app settings
# (settings.database_url) inside alembic/env.py so there is a single source
# of truth and secrets stay out of version control.

[alembic]
# Path to migration scripts, relative to this file's directory.
script_location = alembic

# Template used to generate migration file names; date-prefixed for ordering.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Use OS-native path separators in version locations.
prepend_sys_path = .

# Timezone for file_template timestamps (blank = local time).
# timezone =

# sqlalchemy.url is intentionally omitted — env.py supplies it.

[post_write_hooks]
# (none)

# Logging configuration. The app reconfigures logging via dictConfig at
# runtime; these settings only apply when alembic is run standalone (CLI).
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
