# Deployment compose for a host that already runs Traefik (e.g. the plant Linux
# box managed by Portainer). Traefik terminates TLS and routes the app over the
# external `web` network on port 8000 — the app publishes NO host port. This is
# the canonical prod compose for that setup; deploy it instead of the root
# docker-compose.yml (which is the standalone / Caddy variant).
#
# Use:
#   docker compose -f docker-compose.traefik.yml up -d --build
# or point a Portainer Git stack at this file (Compose path:
# docker-compose.traefik.yml) and supply the env vars below in the stack.
#
# REQUIRED env (Portainer stack vars or a local .env beside this file):
#   APP_HOST, DB_PASSWORD, SECRET_KEY, ADMIN_USERNAME, ADMIN_PASSWORD
# Optional: AI_ENABLED, ANTHROPIC_API_KEY, AI_MODEL, CORS_ORIGINS, BACKUP_KEEP_*.
# See .env.example for the full list (SMTP, AD, alert thresholds) — add any you
# need to the app `environment:` block below.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fmp
      POSTGRES_PASSWORD: "${DB_PASSWORD:?DB_PASSWORD must be set}"
      POSTGRES_DB: fmp
    volumes:
      - fmp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fmp -d fmp"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 1g
    cpus: "1.0"
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: "${APP_ENV:-production}"
      DATABASE_URL: "postgresql+psycopg://fmp:${DB_PASSWORD:?DB_PASSWORD must be set}@db:5432/fmp"
      SECRET_KEY: "${SECRET_KEY:?SECRET_KEY must be set (python -c \"import secrets;print(secrets.token_urlsafe(48))\")}"
      FIRST_ADMIN_USERNAME: "${ADMIN_USERNAME:?ADMIN_USERNAME must be set}"
      FIRST_ADMIN_PASSWORD: "${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set}"
      FIRST_ADMIN_NAME: "Plant Administrator"
      # Behind Traefik the UI + API are same-origin, so the default is fine.
      CORS_ORIGINS: "${CORS_ORIGINS:-*}"
      # Lets the admin "Database Backups" panel read the nightly dumps below.
      BACKUP_DIR: /app/backups
      # AI report narrative (off unless you set a key). See .env.example.
      AI_ENABLED: "${AI_ENABLED:-false}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      AI_MODEL: "${AI_MODEL:-claude-opus-4-8}"
    networks:
      - web          # Traefik's external network (TLS + routing)
      - default      # reach db / db-backup
    volumes:
      # Read-only view of the nightly dumps so the Backups panel can report them.
      - ./backups:/app/backups:ro
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.routers.fibremold.rule=Host(`${APP_HOST:?APP_HOST must be set, e.g. fibremold.gml.com.fj}`)"
      - "traefik.http.routers.fibremold.entrypoints=websecure"
      - "traefik.http.routers.fibremold.tls=true"
      - "traefik.http.services.fibremold.loadbalancer.server.port=8000"
    mem_limit: 1g
    cpus: "1.5"
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # Nightly pg_dump sidecar -> ./backups (7 daily / 4 weekly / 6 monthly).
  db-backup:
    image: prodrigestivill/postgres-backup-local:16
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: fmp
      POSTGRES_USER: fmp
      POSTGRES_PASSWORD: "${DB_PASSWORD:?DB_PASSWORD must be set}"
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: "${BACKUP_KEEP_DAYS:-7}"
      BACKUP_KEEP_WEEKS: "${BACKUP_KEEP_WEEKS:-4}"
      BACKUP_KEEP_MONTHS: "${BACKUP_KEEP_MONTHS:-6}"
      POSTGRES_EXTRA_OPTS: "-Z6"
      HEALTHCHECK_PORT: "8080"
    volumes:
      - ./backups:/backups
    mem_limit: 512m
    cpus: "0.5"
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

volumes:
  fmp_pgdata:

networks:
  web:
    external: true
  default:
